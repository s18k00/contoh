<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Mobile Curve Editor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #1a1a1a; color: #e0e0e0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { background: #111; padding: 10px; border-bottom: 1px solid #333; text-align: center; flex-shrink: 0; }
        header h1 { font-size: 0.8rem; letter-spacing: 1px; color: #fff; text-transform: uppercase; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* PREVIEW AREA */
        #preview-panel {
            flex: 1; background: #151515; display: flex;
            justify-content: center; align-items: center; padding: 10px; 
            overflow: hidden; min-height: 150px;
        }
        #imageCanvas { 
            max-width: 100%; max-height: 100%; object-fit: contain;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-color: #222;
            background-image: linear-gradient(45deg, #2a2a2a 25%, transparent 25%), linear-gradient(-45deg, #2a2a2a 25%, transparent 25%);
            background-size: 10px 10px;
        }

        /* CONTROLS AREA */
        #controls-panel {
            background: #222; padding: 15px;
            border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* FIX STRETCH: Square Aspect Ratio Container */
        .curve-wrapper {
            width: 100%;
            max-width: 280px; /* Ukuran maksimal di mobile */
            margin: 0 auto;
            aspect-ratio: 1 / 1; /* Memastikan kotak tetap persegi sempurna */
            position: relative;
            background: #000;
            border: 1px solid #444;
            touch-action: none;
        }
        #curveCanvas { 
            position: absolute; top: 0; left: 0; 
            width: 100% !important; height: 100% !important; 
            display: block;
        }

        .tabs { display: flex; background: #000; border-radius: 8px; padding: 3px; gap: 3px; }
        .tab {
            flex: 1; text-align: center; padding: 10px 0; cursor: pointer;
            font-size: 0.7rem; font-weight: bold; border-radius: 5px;
        }
        .tab.active { background: #333; }
        .tab[data-chan="all"] { color: #fff; }
        .tab[data-chan="r"] { color: #ff5555; }
        .tab[data-chan="g"] { color: #55ff55; }
        .tab[data-chan="b"] { color: #5555ff; }

        .btn {
            border: none; color: #fff; padding: 12px; border-radius: 8px;
            font-size: 0.85rem; font-weight: bold; cursor: pointer; text-align: center;
        }
        .btn-gray { background: #3a3a3a; }
        .btn-green { background: #2e7d32; }
        .btn-green.disabled { opacity: 0.3; cursor: not-allowed; }

        @media (min-width: 768px) {
            .main-container { flex-direction: row; }
            #controls-panel { width: 320px; height: 100%; border-top: none; border-right: 1px solid #333; }
            .curve-wrapper { max-width: 256px; }
        }
    </style>
</head>
<body>

<header><h1>PRO CURVE EDITOR</h1></header>

<div class="main-container">
    <main id="preview-panel">
        <canvas id="imageCanvas"></canvas>
    </main>

    <aside id="controls-panel">
        <input type="file" id="imageLoader" accept="image/*" style="display:none"/>
        <button class="btn btn-gray" onclick="document.getElementById('imageLoader').click()">PILIH FOTO</button>

        <div class="tabs" id="channelTabs">
            <div class="tab active" data-chan="all">RGB</div>
            <div class="tab" data-chan="r">RED</div>
            <div class="tab" data-chan="g">GREEN</div>
            <div class="tab" data-chan="b">BLUE</div>
        </div>
        
        <div class="curve-wrapper">
            <canvas id="curveCanvas" width="256" height="256"></canvas>
        </div>
        
        <div style="display: flex; gap: 5px;">
            <button class="btn btn-gray" id="resetCurve" style="flex: 1;">RESET</button>
            <a id="downloadLink" class="btn btn-green disabled" style="flex: 2;">SIMPAN PNG</a>
        </div>
    </aside>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const imageCanvas = document.getElementById('imageCanvas');
    const imgCtx = imageCanvas.getContext('2d', { willReadFrequently: true });
    const curveCanvas = document.getElementById('curveCanvas');
    const curveCtx = curveCanvas.getContext('2d');
    const downloadLink = document.getElementById('downloadLink');

    let originalImgData = null;
    let currentChannel = 'all';
    let draggedPointIndex = -1;
    const channelData = {
        all: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        r: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        g: [{ x: 0, y: 256 }, { x: 256, y: 0 }],
        b: [{ x: 0, y: 256 }, { x: 256, y: 0 }]
    };

    // Cubic Spline Logic
    function getSplineLUT(pts) {
        const n = pts.length;
        const x = pts.map(p => p.x);
        const y = pts.map(p => 256 - p.y);
        const lut = new Uint8ClampedArray(256);
        const dx = [], dy = [], ms = [];
        for (let i = 0; i < n - 1; i++) {
            dx[i] = x[i+1] - x[i]; dy[i] = y[i+1] - y[i]; ms[i] = dy[i] / dx[i];
        }
        const c1s = [ms[0]];
        for (let i = 0; i < n - 2; i++) {
            const m = ms[i], mNext = ms[i+1];
            if (m * mNext <= 0) c1s.push(0);
            else {
                const common_ = dx[i] + dx[i+1];
                c1s.push(3 * common_ / ((common_ + dx[i+1]) / m + (common_ + dx[i]) / mNext));
            }
        }
        c1s.push(ms[n - 2]);
        const c2s = [], c3s = [];
        for (let i = 0; i < n - 1; i++) {
            const c1 = c1s[i], m = ms[i], invDx = 1 / dx[i], common_ = c1 + c1s[i+1] - 2 * m;
            c2s.push((m - c1 - common_) * invDx); c3s.push(common_ * invDx * invDx);
        }
        for (let i = 0; i < 256; i++) {
            let j = n - 2;
            while (j > 0 && x[j] > i) j--;
            const diff = i - x[j];
            lut[i] = y[j] + c1s[j] * diff + c2s[j] * diff * diff + c3s[j] * diff * diff * diff;
        }
        return lut;
    }

    function drawCurve() {
        curveCtx.fillStyle = "#000";
        curveCtx.fillRect(0,0,256,256);
        curveCtx.strokeStyle = '#222';
        for(let i=1; i<4; i++) {
            curveCtx.beginPath(); curveCtx.moveTo(i*64, 0); curveCtx.lineTo(i*64, 256); curveCtx.stroke();
            curveCtx.beginPath(); curveCtx.moveTo(0, i*64); curveCtx.lineTo(256, i*64); curveCtx.stroke();
        }
        const colors = { all: '#fff', r: '#ff4444', g: '#44ff44', b: '#4444ff' };
        const lut = getSplineLUT(channelData[currentChannel]);
        curveCtx.strokeStyle = colors[currentChannel];
        curveCtx.lineWidth = 3;
        curveCtx.beginPath();
        curveCtx.moveTo(0, 256 - lut[0]);
        for(let x=1; x<256; x++) curveCtx.lineTo(x, 256 - lut[x]);
        curveCtx.stroke();
        channelData[currentChannel].forEach(p => {
            curveCtx.fillStyle = colors[currentChannel];
            curveCtx.beginPath(); curveCtx.arc(p.x, p.y, 8, 0, Math.PI*2); curveCtx.fill();
            curveCtx.strokeStyle = '#fff'; curveCtx.stroke();
        });
    }

    function applyCurve() {
        if (!originalImgData) return;
        const luts = { 
            all: getSplineLUT(channelData.all), 
            r: getSplineLUT(channelData.r), 
            g: getSplineLUT(channelData.g), 
            b: getSplineLUT(channelData.b) 
        };
        const newImgData = imgCtx.createImageData(imageCanvas.width, imageCanvas.height);
        const src = originalImgData.data; const dst = newImgData.data;
        for (let i = 0; i < src.length; i += 4) {
            dst[i]   = luts.all[luts.r[src[i]]];   
            dst[i+1] = luts.all[luts.g[src[i+1]]]; 
            dst[i+2] = luts.all[luts.b[src[i+2]]]; 
            dst[i+3] = src[i+3];                   
        }
        imgCtx.putImageData(newImgData, 0, 0);
    }

    function setupEvents() {
        const getCoord = (e) => {
            const rect = curveCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            // Penting: Normalisasi koordinat agar tidak stretch
            return { 
                x: (clientX - rect.left) * (256 / rect.width), 
                y: (clientY - rect.top) * (256 / rect.height) 
            };
        };

        const onDown = (e) => {
            const pos = getCoord(e);
            const pts = channelData[currentChannel];
            const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 25);
            if(idx !== -1) draggedPointIndex = idx;
            else if(pos.x > 5 && pos.x < 251) {
                const newPt = { x: pos.x, y: pos.y };
                pts.push(newPt); pts.sort((a,b) => a.x - b.x);
                draggedPointIndex = pts.indexOf(newPt);
                drawCurve(); applyCurve();
            }
        };

        const onMove = (e) => {
            if(draggedPointIndex === -1) return;
            if(e.cancelable) e.preventDefault();
            const pos = getCoord(e);
            const pts = channelData[currentChannel];
            let mx = pos.x; let my = Math.max(0, Math.min(256, pos.y));
            if(draggedPointIndex === 0) mx = 0;
            else if(draggedPointIndex === pts.length-1) mx = 256;
            else mx = Math.max(pts[draggedPointIndex-1].x + 2, Math.min(pts[draggedPointIndex+1].x - 2, mx));
            pts[draggedPointIndex].x = mx; pts[draggedPointIndex].y = my;
            drawCurve(); applyCurve();
        };

        curveCanvas.addEventListener('mousedown', onDown);
        curveCanvas.addEventListener('touchstart', onDown, {passive: false});
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', () => draggedPointIndex = -1);
        window.addEventListener('touchend', () => draggedPointIndex = -1);
        
        let lastTap = 0;
        curveCanvas.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                const pos = getCoord(e.changedTouches[0]);
                const pts = channelData[currentChannel];
                const idx = pts.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 30);
                if(idx > 0 && idx < pts.length - 1) {
                    pts.splice(idx, 1); drawCurve(); applyCurve();
                }
            }
            lastTap = now;
        });
    }

    function handleUpload(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const maxDim = 1000;
                let w = img.width, h = img.height;
                if(w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim/w, maxDim/h);
                    w *= ratio; h *= ratio;
                }
                imageCanvas.width = w; imageCanvas.height = h;
                imgCtx.drawImage(img, 0, 0, w, h);
                originalImgData = imgCtx.getImageData(0, 0, w, h);
                downloadLink.classList.remove('disabled');
                applyCurve();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelector('.tab.active').classList.remove('active');
            tab.classList.add('active');
            currentChannel = tab.dataset.chan;
            drawCurve();
        };
    });

    document.getElementById('resetCurve').onclick = () => {
        channelData[currentChannel] = [{ x: 0, y: 256 }, { x: 256, y: 0 }];
        drawCurve(); applyCurve();
    };

    downloadLink.onclick = (e) => {
        if (downloadLink.classList.contains('disabled')) return e.preventDefault();
        downloadLink.href = imageCanvas.toDataURL("image/png");
        downloadLink.download = "curve_edit.png";
    };

    setupEvents(); drawCurve();
</script>
</body>
</html>
